<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auooshadh | Smart E-Prescription for Doctors</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background-color: var(--bg-color);
    }
    
    .auth-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .auth-left {
      flex: 1;
      background: linear-gradient(135deg, var(--primary-blue), #1e3a8a);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
      position: relative;
      overflow: hidden;
    }

    .auth-left::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .auth-left h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      z-index: 1;
    }

    .auth-left p {
      font-size: 1.125rem;
      opacity: 0.9;
      max-width: 400px;
      line-height: 1.6;
      z-index: 1;
    }

    .auth-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-color);
      padding: 2rem;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border-color);
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 1rem;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-muted);
      transition: all var(--transition-fast);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }

    .auth-tab.active {
      color: var(--primary-blue);
      border-bottom-color: var(--primary-blue);
    }

    .auth-form {
      display: none;
      animation: fadeIn var(--transition-normal);
    }

    .auth-form.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-block {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      margin-top: 1rem;
    }

    .error-msg {
      color: var(--status-critical);
      font-size: 0.875rem;
      margin-top: -0.5rem;
      margin-bottom: 1rem;
      display: none;
    }

    @media (max-width: 768px) {
      .auth-left {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-left">
      <h1>Auooshadh</h1>
      <p>The fast, secure, and smart E-Prescription platform tailored for modern medical professionals.</p>
    </div>

    <div class="auth-right">
      <div class="auth-box card">
        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-login">Login</div>
          <div class="auth-tab" id="tab-signup">Register</div>
        </div>

        <!-- Login Form -->
        <form id="form-login" class="auth-form active">
          <div class="input-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" required placeholder="doctor@hospital.com">
          </div>
          <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required placeholder="••••••••">
          </div>
          <div id="login-error" class="error-msg"></div>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="form-signup" class="auth-form">
          <div class="input-group">
            <label for="signup-name">Full Name (Dr.)</label>
            <input type="text" id="signup-name" required placeholder="Dr. John Doe">
          </div>
          <div class="input-group">
            <label for="signup-email">Email Address</label>
            <input type="email" id="signup-email" required placeholder="doctor@hospital.com">
          </div>
          <div class="input-group">
            <label for="signup-license">Medical License ID</label>
            <input type="text" id="signup-license" required placeholder="MED123456">
          </div>
          <div class="input-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required placeholder="••••••••" minlength="6">
          </div>
          <div id="signup-error" class="error-msg"></div>
          <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/js/auth.js"></script>
  <script>
    // Tab switching logic
    document.getElementById('tab-login').addEventListener('click', () => {
      document.getElementById('tab-login').classList.add('active');
      document.getElementById('tab-signup').classList.remove('active');
      document.getElementById('form-login').classList.add('active');
      document.getElementById('form-signup').classList.remove('active');
    });

    document.getElementById('tab-signup').addEventListener('click', () => {
      document.getElementById('tab-signup').classList.add('active');
      document.getElementById('tab-login').classList.remove('active');
      document.getElementById('form-signup').classList.add('active');
      document.getElementById('form-login').classList.remove('active');
    });
  </script>
</body>
</html>
